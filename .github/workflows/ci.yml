name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: base_hermes.settings.dev
    defaults:
      run:
        working-directory: hermes_directory_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Django check
        run: python manage.py check

      - name: Django deploy check (production profile)
        env:
          DJANGO_SETTINGS_MODULE: base_hermes.settings.prod
          SECRET_KEY: ci-this-is-a-long-temporary-secret-key-for-deploy-check-1234567890
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          CSRF_TRUSTED_ORIGINS: http://localhost:5173
        run: python manage.py check --deploy

      - name: Migrations check
        run: python manage.py makemigrations --check

      - name: Backend tests
        run: python manage.py test api_hermes -v 2

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes_directory_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: hermes_directory_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      DJANGO_SETTINGS_MODULE: base_hermes.settings.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: hermes_directory_frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: hermes_directory_frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: hermes_directory_frontend

      - name: Run e2e smoke tests
        run: npm run test:e2e:smoke
        working-directory: hermes_directory_frontend

  deploy-readiness:
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e-smoke]
    env:
      DJANGO_SETTINGS_MODULE: base_hermes.settings.prod
      SECRET_KEY: ci-this-is-a-long-temporary-secret-key-for-deploy-check-1234567890
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      SECURE_SSL_REDIRECT: "False"
    defaults:
      run:
        working-directory: hermes_directory_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r ../requirements.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Runtime health check
        run: |
          python manage.py runserver 127.0.0.1:8001 &
          SERVER_PID=$!
          sleep 5
          curl --fail http://127.0.0.1:8001/api/health/
          kill $SERVER_PID

  deploy-readiness-postgres:
    runs-on: ubuntu-latest
    needs: [deploy-readiness]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: hermes_ci
          POSTGRES_USER: hermes_ci_user
          POSTGRES_PASSWORD: hermes_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hermes_ci_user -d hermes_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: base_hermes.settings.prod
      SECRET_KEY: ci-this-is-a-long-temporary-secret-key-for-deploy-check-1234567890
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      SECURE_SSL_REDIRECT: "False"
      USE_POSTGRES: "True"
      POSTGRES_DB: hermes_ci
      POSTGRES_USER: hermes_ci_user
      POSTGRES_PASSWORD: hermes_ci_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_CONN_MAX_AGE: "60"
    defaults:
      run:
        working-directory: hermes_directory_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: pip install -r ../requirements.txt

      - name: Apply migrations (PostgreSQL)
        run: |
          for i in {1..20}; do
            if python manage.py migrate --noinput; then
              echo "Migrations applied successfully on attempt $i/20."
              exit 0
            fi
            echo "PostgreSQL is not ready yet, retry $i/20..."
            sleep 3
          done
          echo "PostgreSQL did not become ready after 20 attempts. Failing deploy-readiness-postgres."
          exit 1

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Runtime health check
        run: |
          python manage.py runserver 127.0.0.1:8002 &
          SERVER_PID=$!
          sleep 5
          curl --fail http://127.0.0.1:8002/api/health/
          kill $SERVER_PID

  post-deploy-smoke:
    runs-on: ubuntu-latest
    needs: [deploy-readiness-postgres]
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
    env:
      PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      PLAYWRIGHT_USE_LOCAL_SERVERS: "false"
      E2E_ADMIN_USERNAME: ${{ secrets.STAGING_ADMIN_USERNAME }}
      E2E_ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASSWORD }}
      E2E_RESIDENT_OWNER: ${{ vars.STAGING_RESIDENT_OWNER }}
    defaults:
      run:
        working-directory: hermes_directory_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify staging secrets are present
        run: |
          if [ -z "${PLAYWRIGHT_BASE_URL}" ]; then
            echo "Missing required secret: STAGING_BASE_URL"
            exit 1
          fi
          if [ -z "${E2E_ADMIN_USERNAME}" ]; then
            echo "Missing required secret: STAGING_ADMIN_USERNAME"
            exit 1
          fi
          if [ -z "${E2E_ADMIN_PASSWORD}" ]; then
            echo "Missing required secret: STAGING_ADMIN_PASSWORD"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: hermes_directory_frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run post-deploy smoke tests
        run: npm run test:e2e:smoke
