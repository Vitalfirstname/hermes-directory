name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes_directory_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Django check
        run: python manage.py check

      - name: Migrations check
        run: python manage.py makemigrations --check

      - name: Backend tests
        run: python manage.py test api_hermes -v 2

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes_directory_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: hermes_directory_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
