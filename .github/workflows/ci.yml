name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: base_hermes.settings.dev
    defaults:
      run:
        working-directory: hermes_directory_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Django check
        run: python manage.py check

      - name: Django deploy check (production profile)
        env:
          DJANGO_SETTINGS_MODULE: base_hermes.settings.prod
          SECRET_KEY: ci-this-is-a-long-temporary-secret-key-for-deploy-check-1234567890
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          CSRF_TRUSTED_ORIGINS: http://localhost:5173
        run: python manage.py check --deploy

      - name: Migrations check
        run: python manage.py makemigrations --check

      - name: Backend tests
        run: python manage.py test api_hermes -v 2

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes_directory_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: hermes_directory_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      DJANGO_SETTINGS_MODULE: base_hermes.settings.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: hermes_directory_frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: hermes_directory_frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: hermes_directory_frontend

      - name: Run e2e smoke tests
        run: npm run test:e2e:smoke
        working-directory: hermes_directory_frontend
